# Build FAISS for ARMv7 (NEON) via cross-compilation
#
# Target: Allwinner H3 / Cortex-A7 (e.g. OneCloud)
# Host:   ubuntu-latest (GitHub Actions runner)

name: Build FAISS ARMv7

on:
  workflow_dispatch:
    inputs:
      faiss_ref:
        description: 'FAISS git ref to build (branch/tag/sha)'
        required: false
        default: 'main'
      deploy:
        description: 'Deploy to target device via SSH'
        required: false
        default: 'false'
        type: boolean
  push:
    branches: [main]
    paths:
      - 'cmake/toolchains/armv7-linux-gnueabihf.cmake'
      - '.github/workflows/build-armv7.yml'

env:
  OMP_NUM_THREADS: '4'
  FAISS_REF: ${{ github.event.inputs.faiss_ref || 'main' }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 交叉编译
  # ─────────────────────────────────────────────
  build:
    name: Cross-compile FAISS (ARMv7 NEON)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up ARMv7 cross-compilation environment
        run: |
          sudo dpkg --add-architecture armhf

          # 限制现有 apt 源只取 amd64，防止拉 armhf 包失败
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types: deb$/a Architectures: amd64 i386' \
              /etc/apt/sources.list.d/ubuntu.sources
          fi
          if grep -q '^deb http' /etc/apt/sources.list 2>/dev/null; then
            sudo sed -i 's|^deb http|deb [arch=amd64,i386] http|g' \
              /etc/apt/sources.list
          fi

          # 添加 Ubuntu Ports 作为 armhf 包源
          CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main restricted universe" \
            | sudo tee    /etc/apt/sources.list.d/armhf-ports.list
          echo "deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main restricted universe" \
            | sudo tee -a /etc/apt/sources.list.d/armhf-ports.list

          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake make \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf \
            gfortran-arm-linux-gnueabihf \
            libopenblas-dev:armhf \
            liblapack-dev:armhf \
            libgomp1:armhf \
            qemu-user-static

          # 创建 multiarch symlink，让 CMake find_library 能找到 armhf 库
          sudo mkdir -p /usr/arm-linux-gnueabihf/usr/lib
          sudo ln -sfn /usr/lib/arm-linux-gnueabihf \
            /usr/arm-linux-gnueabihf/usr/lib/arm-linux-gnueabihf

          echo "--- Toolchain versions ---"
          arm-linux-gnueabihf-gcc --version | head -1
          arm-linux-gnueabihf-g++ --version | head -1
          cmake --version | head -1
          qemu-arm-static --version | head -1

      - name: Clone FAISS source
        run: |
          git clone --depth 1 --branch "$FAISS_REF" \
            https://github.com/facebookresearch/faiss.git faiss-src 2>/dev/null \
          || git clone --depth 1 https://github.com/facebookresearch/faiss.git faiss-src
          cd faiss-src
          git submodule update --init

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: linux-armv7-neon
          max-size: 2G
          update-package-index: true

      - name: Configure (cmake)
        working-directory: faiss-src
        run: |
          cmake -B build . \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/cmake/toolchains/armv7-linux-gnueabihf.cmake \
            -DBUILD_TESTING=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DFAISS_ENABLE_GPU=OFF \
            -DFAISS_ENABLE_PYTHON=OFF \
            -DFAISS_ENABLE_C_API=OFF \
            -DFAISS_ENABLE_MKL=OFF \
            -DFAISS_ENABLE_EXTRAS=OFF \
            -DFAISS_OPT_LEVEL=generic \
            -DBLA_VENDOR=OpenBLAS \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="-mfpu=neon -O3 -fopenmp" \
            -DCMAKE_C_FLAGS="-mfpu=neon -O3 -fopenmp" \
            -DCMAKE_BUILD_RPATH=/usr/lib/arm-linux-gnueabihf \
            -DCMAKE_INSTALL_PREFIX=/usr

          echo "--- CMake cache summary ---"
          grep -E "FAISS_OPT_LEVEL|BLA_VENDOR|CMAKE_CXX_FLAGS" build/CMakeCache.txt || true

      - name: Build
        working-directory: faiss-src
        run: cmake --build build -j$(nproc) 2>&1 | tail -20

      - name: Verify binary architecture
        run: |
          echo "=== libfaiss.so ==="
          file faiss-src/build/faiss/libfaiss.so
          file faiss-src/build/faiss/libfaiss.so | grep -q "ARM" || \
            { echo "ERROR: not an ARM binary"; exit 1; }

          echo "=== faiss_test ==="
          file faiss-src/build/tests/faiss_test 2>/dev/null || echo "faiss_test not found"

      - name: Verify NEON instructions present
        run: |
          echo "Checking for NEON (vld/vmul/vadd/vfma) instructions..."
          NEON_COUNT=$(arm-linux-gnueabihf-objdump -d \
            faiss-src/build/faiss/libfaiss.so | grep -cE "vld|vmul|vadd|vfma" || true)
          echo "NEON instruction count: $NEON_COUNT"
          if [ "$NEON_COUNT" -eq 0 ]; then
            echo "WARNING: No NEON instructions found - check -mfpu=neon flag"
          else
            echo "✓ NEON instructions confirmed"
          fi

      - name: Run tests (via qemu)
        working-directory: faiss-src
        run: |
          # 设置 qemu 运行环境
          export QEMU_LD_PREFIX=/usr/arm-linux-gnueabihf
          export LD_LIBRARY_PATH=$PWD/build/faiss:$LD_LIBRARY_PATH

          echo "=== ldd check ==="
          ARM_LD=$(find /usr/arm-linux-gnueabihf/lib \
            -name "ld-linux-armhf*.so.*" | head -1)
          qemu-arm-static -L /usr/arm-linux-gnueabihf \
            "$ARM_LD" --list build/faiss/libfaiss.so 2>&1 | head -20

          echo "=== Running faiss_test ==="
          # 只跑核心测试，qemu 下跑全量太慢
          qemu-arm-static -L /usr/arm-linux-gnueabihf \
            build/tests/faiss_test --gtest_filter="*Flat*" 2>&1 | tail -30 || {
            echo "Tests failed or not runnable under qemu (expected for some tests)"
          }

      - name: Install to staging directory
        working-directory: faiss-src
        run: |
          DESTDIR=${{ github.workspace }}/faiss-armv7-root make -C build install
          echo "=== Installed files ==="
          find ${{ github.workspace }}/faiss-armv7-root -type f | head -30

      - name: Package artifacts
        run: |
          cd faiss-armv7-root
          tar czf ${{ github.workspace }}/faiss-armv7-neon.tar.gz \
            --transform 's,^,faiss-armv7/,' \
            .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: faiss-armv7-neon
          path: faiss-armv7-neon.tar.gz
          retention-days: 30
