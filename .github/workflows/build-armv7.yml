name: Build ZeroClaw armv7

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone upstream ZeroClaw
        run: git clone --depth 1 https://github.com/zeroclaw-labs/zeroclaw.git src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Configure linker and cross-compile env
        run: |
          mkdir -p src/.cargo
          cat > src/.cargo/config.toml << 'EOF'
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF
          # 修正：去掉 heredoc 带来的多余缩进
          sed -i 's/^          //' src/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            src/target
            ~/.cargo/registry
            ~/.cargo/git
          key: armv7-cargo-${{ hashFiles('src/Cargo.lock') }}

      - name: Build binary
        working-directory: src
        env:
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          CXX_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: |
          cargo build --release --target armv7-unknown-linux-gnueabihf \
            --no-default-features --features agent-runtime,gateway,schema-export

      - name: Build web dashboard
        working-directory: src/web
        run: |
          npm ci
          npm run build

      - name: Package
        run: |
          mkdir -p dist
          cp src/target/armv7-unknown-linux-gnueabihf/release/zeroclaw dist/
          cp -r src/web/dist dist/web-dist
          cd dist && tar czf ../zeroclaw-armv7-latest.tar.gz zeroclaw web-dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-armv7
          path: zeroclaw-armv7-latest.tar.gz
