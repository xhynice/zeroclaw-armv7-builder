name: Build ZeroClaw armv7

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── 第一阶段：构建 Web Dashboard ──
  web:
    name: Build Web Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone upstream ZeroClaw
        run: git clone --depth 1 https://github.com/zeroclaw-labs/zeroclaw.git src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Build web dashboard (cargo web build)
        working-directory: src
        run: cargo web build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: src/web/dist/
          retention-days: 7

  # ── 第二阶段：交叉编译 armv7 二进制 ──
  build:
    name: Build armv7 binary
    needs: [web]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.info.outputs.version }}
      sha: ${{ steps.info.outputs.sha }}
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone upstream ZeroClaw
        run: git clone --depth 1 https://github.com/zeroclaw-labs/zeroclaw.git src

      - name: Capture upstream info
        id: info
        working-directory: src
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          # 用 grep 提取版本号，避免 sed 正则 bug
          VERSION=$(grep '^version' Cargo.toml | head -1 | grep -oP '\d+\.\d+\.\d+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Collect upstream commits since last release
        id: commits
        working-directory: src
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          LAST_RELEASE=$(gh release list --repo ${{ github.repository }} --limit 1 --json createdAt --jq '.[0].createdAt' 2>/dev/null || echo "")

          if [ -z "$LAST_RELEASE" ] || [ "$LAST_RELEASE" = "null" ]; then
            SINCE=$(date -d '30 days ago' '+%Y-%m-%d')
          else
            SINCE=$(date -d "$LAST_RELEASE" '+%Y-%m-%d')
          fi

          TODAY=$(date '+%Y-%m-%d')
          COMMITS=$(git log --since="$SINCE" --pretty=format:'%h|%s|%an|%ad' --date=short --no-merges | head -30)

          if [ -z "$COMMITS" ]; then
            COMMITS=$(git log --pretty=format:'%h|%s|%an|%ad' --date=short --no-merges | head -10)
          fi

          if [ -z "$COMMITS" ]; then
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_commits=true" >> "$GITHUB_OUTPUT"

          # 英文版
          {
            echo "# ZeroClaw 上游更新日志"
            echo ""
            echo "**构建版本:** v$VERSION (${{ steps.info.outputs.sha }})"
            echo "**构建日期:** $TODAY"
            echo "**更新范围:** $SINCE 至今"
            echo ""
            echo "---"
            echo ""
            echo "| 提交 | 说明 | 作者 | 日期 |"
            echo "|------|------|------|------|"
            echo "$COMMITS" | while IFS='|' read -r hash msg author date; do
              echo "| \`$hash\` | $msg | $author | $date |"
            done
          } > "CHANGELOG-EN-${TODAY}.md"

          # 中文版
          {
            echo "# ZeroClaw 上游更新日志"
            echo ""
            echo "**构建版本:** v$VERSION (${{ steps.info.outputs.sha }})"
            echo "**构建日期:** $TODAY"
            echo "**更新范围:** $SINCE 至今"
            echo ""
            echo "---"
            echo ""
            echo "| 提交 | 说明 | 作者 | 日期 |"
            echo "|------|------|------|------|"
            echo "$COMMITS" | while IFS='|' read -r hash msg author date; do
              zh_msg="$msg"
              zh_msg=$(echo "$zh_msg" | sed \
                -e 's/^feat:/功能:/' \
                -e 's/^fix:/修复:/' \
                -e 's/^docs:/文档:/' \
                -e 's/^style:/样式:/' \
                -e 's/^refactor:/重构:/' \
                -e 's/^perf:/性能:/' \
                -e 's/^test:/测试:/' \
                -e 's/^chore:/杂项:/' \
                -e 's/^ci:/持续集成:/' \
                -e 's/^build:/构建:/' \
                -e 's/^revert:/回滚:/' \
                -e 's/^add/新增/' \
                -e 's/^remove/移除/' \
                -e 's/^update/更新/' \
                -e 's/^delete/删除/' \
                -e 's/^fix/修复/' \
                -e 's/^support/支持/' \
                -e 's/^implement/实现/' \
                -e 's/^improve/改进/' \
                -e 's/^optimize/优化/' \
                -e 's/^refactor/重构/' \
                -e 's/^rename/重命名/' \
                -e 's/^move/移动/' \
                -e 's/^merge/合并/' \
                -e 's/^bump/升级/' \
                -e 's/^release/发布/' \
                -e 's/^initial/初始化/' \
                -e 's/^deprecated/废弃/' \
                -e 's/^breaking/破坏性变更:/' \
                -e 's/^dependencies/依赖/' \
                -e 's/^devDependencies/开发依赖/')
              echo "| \`$hash\` | $zh_msg | $author | $date |"
            done
          } > "CHANGELOG-ZH-${TODAY}.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          targets: armv7-unknown-linux-gnueabihf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          key: armv7

      - name: Install cross compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Configure linker
        run: |
          mkdir -p src/.cargo
          cat > src/.cargo/config.toml << 'EOF'
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF

      - name: Download web dashboard
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: src/web/dist/

      - name: Build release
        working-directory: src
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: |
          cargo build --release --no-default-features \
            --features agent-runtime,gateway,observability-prometheus,schema-export \
            --target armv7-unknown-linux-gnueabihf

      - name: Package
        run: |
          TODAY=$(date '+%Y-%m-%d')
          mkdir -p dist
          cp src/target/armv7-unknown-linux-gnueabihf/release/zeroclaw dist/
          cp -r src/web/dist dist/web-dist

          if [ "${{ steps.commits.outputs.has_commits }}" = "true" ]; then
            cp "src/CHANGELOG-EN-${TODAY}.md" "src/CHANGELOG-ZH-${TODAY}.md" dist/
          fi

          cd dist && tar czf ../zeroclaw-armv7-latest.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-armv7
          path: zeroclaw-armv7-latest.tar.gz
          retention-days: 7

  # ── 第三阶段：发布 Release ──
  release:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clean up old releases (keep latest 10)
        run: |
          gh release list --repo ${{ github.repository }} --limit 200 --json tagName,publishedAt \
            --jq 'sort_by(.publishedAt) | reverse | .[10:] | .[].tagName' \
          | while read -r tag; do
              echo "Deleting old release: $tag"
              gh release delete "$tag" --repo ${{ github.repository }} --yes --cleanup-tag
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: zeroclaw-armv7
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: "ZeroClaw armv7 v${{ needs.build.outputs.version }} (${{ needs.build.outputs.sha }})"
          body: |
            ## ZeroClaw armv7 构建

            **上游版本:** v${{ needs.build.outputs.version }}
            **上游 Commit:** ${{ needs.build.outputs.sha }}
            **Features:** `agent-runtime, gateway, observability-prometheus, schema-export`

            ### 安装

            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/xhynice/zeroclaw-armv7-builder/main/install.sh)
            ```
          files: dist/zeroclaw-armv7-latest.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
