name: Build ZeroClaw armv7

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── 第一阶段：构建 Web Dashboard ──
  web:
    name: Build Web Dashboard
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone upstream ZeroClaw
        run: git clone --depth 1 https://github.com/zeroclaw-labs/zeroclaw.git src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Build web dashboard (cargo web build)
        working-directory: src
        # cargo web build 做了 3 件事：
        # 1. 渲染 gateway 的 OpenAPI 3.1 spec
        # 2. 运行 openapi-typescript 生成 web/src/lib/api-generated.ts
        # 3. npm ci + npm run build (tsc + vite)
        run: cargo web build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: src/web/dist/
          retention-days: 7

  # ── 第二阶段：交叉编译 armv7 二进制 ──
  build:
    name: Build armv7 binary
    needs: [web]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone upstream ZeroClaw
        run: git clone --depth 1 https://github.com/zeroclaw-labs/zeroclaw.git src

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          targets: armv7-unknown-linux-gnueabihf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          key: armv7

      - name: Install cross compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Configure linker
        run: |
          mkdir -p src/.cargo
          cat > src/.cargo/config.toml << 'EOF'
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF
          sed -i 's/^          //' src/.cargo/config.toml

      - name: Download web dashboard
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: src/web/dist/

      - name: Build release
        working-directory: src
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: |
          # 参考官方 release workflow: armv7 用 --no-default-features 跳过 prometheus
          # 官方: agent-runtime,schema-export,channel-matrix,channel-lark,whatsapp-web
          # 我们额外加 gateway (WebUI)
          cargo build --release --locked --target armv7-unknown-linux-gnueabihf
          #cargo build --release --locked --no-default-features \
          #  --features "agent-runtime,gateway,schema-export" \
          #  --target armv7-unknown-linux-gnueabihf

      - name: Package
        run: |
          mkdir -p dist
          cp src/target/armv7-unknown-linux-gnueabihf/release/zeroclaw dist/
          cp -r src/web/dist dist/web-dist
          cd dist && tar czf ../zeroclaw-armv7-latest.tar.gz zeroclaw web-dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-armv7
          path: zeroclaw-armv7-latest.tar.gz
          retention-days: 30
