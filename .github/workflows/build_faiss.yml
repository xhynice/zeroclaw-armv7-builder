name: Build faiss-cpu for armhf (v1.13.2 using faiss-wheels)

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build using faiss-wheels
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace \
            --platform linux/arm/v7 \
            python:3.12 \
            bash -c "
              apt-get update && \
              apt-get install -y swig build-essential gfortran libopenblas-dev cmake git python3-dev python3-pip && \
              python3 -m pip install scikit-build-core build && \
              git clone https://github.com/kyamagu/faiss-wheels.git && \
              cd faiss-wheels && \
              export FAISS_VERSION=1.13.2 && \
              python3 -m build --wheel
            "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: faiss-cpu-armhf-wheel-v1.13.2
          path: faiss-wheels/dist/*.whl
          retention-days: 7
