name: Build faiss-cpu ARMv7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build everything in ARM32 container
        run: |
          mkdir -p output

          docker run --rm --platform linux/arm/v7 \
            -v $(pwd)/output:/output \
            arm32v7/ubuntu:22.04 \
            bash -c '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            export MAKEFLAGS="-j2"

            apt-get update && apt-get install -y \
              python3-dev python3-pip python3-venv \
              cmake g++ gfortran make \
              libopenblas-dev liblapack-dev \
              swig git wget ca-certificates

            pip3 install --break-system-packages --upgrade pip
            pip3 install --break-system-packages numpy wheel setuptools

            # === 编译 OpenBLAS（系统包可能版本旧，自己编译更稳）===
            cd /tmp
            wget -q https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.25/OpenBLAS-0.3.25.tar.gz
            tar xzf OpenBLAS-0.3.25.tar.gz
            cd OpenBLAS-0.3.25
            make TARGET=ARMV7 USE_THREAD=0 NO_SHARED=1
            make install PREFIX=/opt/openblas NO_SHARED=1
            echo "OpenBLAS done"

            # === 编译 faiss ===
            cd /tmp
            wget -q https://github.com/facebookresearch/faiss/archive/refs/tags/v1.8.0.tar.gz
            tar xzf v1.8.0.tar.gz
            cd faiss-1.8.0

            cmake -B build . \
              -DFAISS_ENABLE_GPU=OFF \
              -DFAISS_ENABLE_PYTHON=ON \
              -DBUILD_TESTING=OFF \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_BUILD_TYPE=Release \
              -DFAISS_OPT_LEVEL=generic \
              -DBLAS_LIBRARIES=/opt/openblas/lib/libopenblas.a \
              -DBLAS_INCLUDE_DIRS=/opt/openblas/include \
              -DLAPACK_LIBRARIES=/opt/openblas/lib/libopenblas.a \
              -DPython_EXECUTABLE=/usr/bin/python3

            cmake --build build -j2
            echo "faiss C++ done"

            # === 打包 Python wheel ===
            cd build/faiss/python
            python3 setup.py bdist_wheel

            cp dist/*.whl /output/
            echo "=== wheel ==="
            ls -la /output/*.whl

            # === 验证 ===
            pip3 install /output/*.whl
            python3 -c "
            import faiss
            print(\"faiss version:\", faiss.__version__)
            # 快速功能测试
            import numpy as np
            d = 64
            nb = 100
            nq = 5
            xb = np.random.random((nb, d)).astype(\"float32\")
            xq = np.random.random((nq, d)).astype(\"float32\")
            index = faiss.IndexFlatL2(d)
            index.add(xb)
            D, I = index.search(xq, 5)
            print(\"Search result:\", I.shape, \"OK!\")
            "
            '

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: faiss-cpu-armv7l
          path: output/*.whl
          retention-days: 90
