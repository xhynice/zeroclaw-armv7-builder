name: Build faiss-cpu for armhf (v1.13.2)

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build faiss-cpu wheel (v1.13.2)
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace \
            --platform linux/arm/v7 \
            python:3.12 \
            bash -c "
              apt-get update && \
              apt-get install -y swig build-essential gfortran libopenblas-dev cmake git python3-dev python3-pip && \
              python3 -m pip install --upgrade pip setuptools wheel && \
              git clone https://github.com/facebookresearch/faiss.git && \
              cd faiss && \
              git checkout v1.13.2 && \
              git submodule update --init --recursive && \
              cd faiss/python && \
              python3 setup.py bdist_wheel
            "

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: faiss-cpu-armhf-wheel-v1.13.2
          path: faiss/faiss/python/dist/*.whl
          retention-days: 7
