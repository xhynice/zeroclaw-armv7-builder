name: Build faiss ARMv7 (pure cross)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            gfortran-arm-linux-gnueabihf \
            cmake swig git make python3-pip
          pip3 install wheel setuptools numpy

      - name: Build OpenBLAS
        run: |
          git clone --depth 1 --branch v0.3.25 https://github.com/OpenMathLib/OpenBLAS.git
          cd OpenBLAS
          make -j$(nproc) \
            CC=arm-linux-gnueabihf-gcc FC=arm-linux-gnueabihf-gfortran \
            HOSTCC=gcc TARGET=ARMV7 NO_SHARED=1 USE_THREAD=0
          make install PREFIX=$GITHUB_WORKSPACE/openblas NO_SHARED=1

      - name: Build faiss C++
        run: |
          git clone --depth 1 --branch v1.8.0 https://github.com/facebookresearch/faiss.git
          cd faiss

          cat > armv7.cmake << EOF
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR armv7l)
          set(CMAKE_C_COMPILER arm-linux-gnueabihf-gcc)
          set(CMAKE_CXX_COMPILER arm-linux-gnueabihf-g++)
          EOF

          cmake -B build . \
            -DCMAKE_TOOLCHAIN_FILE=armv7.cmake \
            -DFAISS_ENABLE_GPU=OFF \
            -DFAISS_ENABLE_PYTHON=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DFAISS_OPT_LEVEL=generic \
            -DBLA_VENDOR=OpenBLAS \
            -DBLAS_INCLUDE_DIRS=$GITHUB_WORKSPACE/openblas/include \
            -DBLAS_LIBRARIES="$GITHUB_WORKSPACE/openblas/lib/libopenblas.a;-lpthread;-lgfortran" \
            -DLAPACK_LIBRARIES="$GITHUB_WORKSPACE/openblas/lib/libopenblas.a;-lpthread;-lgfortran"

          cmake --build build -j$(nproc)

      - name: Build Python binding via QEMU (lightweight)
        run: |
          sudo apt-get install -y qemu-user-static

          # 只用 QEMU 做 Python 打包，C++ 不走 QEMU
          docker run --rm --platform linux/arm/v7 \
            -v $GITHUB_WORKSPACE/faiss:/faiss \
            -v $GITHUB_WORKSPACE/openblas:/openblas \
            arm32v7/ubuntu:22.04 \
            bash -c '
            apt-get update && apt-get install -y python3-dev python3-pip cmake g++ swig
            pip3 install --break-system-packages numpy wheel setuptools
            cd /faiss
            cmake -B build . \
              -DFAISS_ENABLE_GPU=OFF -DFAISS_ENABLE_PYTHON=ON \
              -DBUILD_TESTING=OFF -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_BUILD_TYPE=Release -DFAISS_OPT_LEVEL=generic \
              -DBLAS_INCLUDE_DIRS=/openblas/include \
              -DBLAS_LIBRARIES="/openblas/lib/libopenblas.a" \
              -DLAPACK_LIBRARIES="/openblas/lib/libopenblas.a"
            cmake --build build --target faiss_python -j2
            cd build/faiss/python && python3 setup.py bdist_wheel
            cp dist/*.whl /faiss/
            pip3 install /faiss/*.whl
            python3 -c "import faiss; print(faiss.__version__)"
            '

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: faiss-cpu-armv7l
          path: faiss/*.whl
